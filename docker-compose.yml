services:
  postgres:
    image: postgres:16-alpine
    container_name: codex-relay-postgres
    environment:
      POSTGRES_DB: codex_relay
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "54329:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: codex-relay-redis
    ports:
      - "63799:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:

